[slides]
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Multidimensional - D3.js Pro</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .slide-container { background: white; width: 1200px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-card { border: 1px solid #eef; border-radius: 10px; padding: 15px; background: #fff; }
        
        button { background: #4285F4; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        button:hover { background: #3367d6; transform: scale(1.05); }

        /* Estilos D3 */
        .tooltip { position: absolute; padding: 12px; background: rgba(30, 41, 59, 0.9); color: #fff; border-radius: 8px; pointer-events: none; font-size: 13px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .bubble { stroke-width: 2px; cursor: pointer; }
        .bubble:hover { stroke: #000 !important; }
        .axis-text { font-size: 12px; fill: #666; }
    </style>
</head>
<body>

<div class="slide-container">
    <div class="header">
        <h2>Dashboard Estratégico de Ventas</h2>
        <button onclick="actualizarDashboard()">Actualizar Datos</button>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <h3>Comparativa Enero vs Febrero</h3>
            <div id="google_chart_div" style="height: 400px;"></div>
        </div>
        <div class="chart-card">
            <h3>Análisis de 4 Dimensiones (D3.js)</h3>
            <div id="d3_chart_div" style="height: 400px;"></div>
        </div>
    </div>
</div>

<script>
    // 1. DATASET INICIAL
    let baseData = [
        {producto: "Smartphone A", enero: 120, febrero: 150, precio: 200},
        {producto: "Smartphone B", enero: 85, febrero: 90, precio: 220},
        {producto: "Tablet X", enero: 60, febrero: 70, precio: 350}
    ];

    const COLORS = { Enero: '#4285F4', Febrero: '#DB4437' };

    // 2. INICIALIZACIÓN
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(() => {
        drawGoogleChart();
        initD3Chart();
    });

    function actualizarDashboard() {
        baseData.forEach(d => {
            d.enero = Math.floor(Math.random() * 150) + 30;
            d.febrero = Math.floor(Math.random() * 150) + 30;
            // El precio también fluctúa ligeramente
            d.precio = d.precio + (Math.random() * 20 - 10);
        });
        drawGoogleChart();
        updateD3Chart();
    }

    // 3. GOOGLE CHARTS
    function drawGoogleChart() {
        const data = google.visualization.arrayToDataTable([
            ['Producto', 'Enero', 'Febrero'],
            ...baseData.map(d => [d.producto, d.enero, d.febrero])
        ]);
        const options = { colors: [COLORS.Enero, COLORS.Febrero], animation: {duration: 800, easing: 'out'}, legend: 'top', chartArea: {width: '80%'} };
        new google.visualization.ColumnChart(document.getElementById('google_chart_div')).draw(data, options);
    }

    // 4. D3.JS - MANEJO DE TRANSICIONES Y EVENTOS
    let svg, xScale, yScale, rScale;

    function initD3Chart() {
        const container = d3.select("#d3_chart_div");
        const width = container.node().offsetWidth;
        const height = container.node().offsetHeight;

        svg = container.append("svg").attr("width", width).attr("height", height);

        xScale = d3.scalePoint().domain(baseData.map(d => d.producto)).range([80, width - 80]).padding(0.5);
        yScale = d3.scaleLinear().domain([0, 200]).range([height - 50, 50]);
        rScale = d3.scaleSqrt().domain([100, 400]).range([10, 40]);

        // Ejes
        svg.append("g").attr("transform", `translate(0,${height - 50})`).call(d3.axisBottom(xScale));
        svg.append("g").attr("transform", "translate(60,0)").call(d3.axisLeft(yScale));

        updateD3Chart();
    }

    function updateD3Chart() {
        const flatData = [];
        baseData.forEach(d => {
            flatData.push({p: d.producto, v: d.enero, mes: 'Enero', precio: d.precio});
            flatData.push({p: d.producto, v: d.febrero, mes: 'Febrero', precio: d.precio});
        });

        const circles = svg.selectAll(".bubble").data(flatData);

        // EXIT: Eliminar burbujas viejas
        circles.exit().remove();

        // ENTER + UPDATE: Crear y animar burbujas
        circles.enter()
            .append("circle")
            .attr("class", "bubble")
            .attr("cx", d => xScale(d.p))
            .attr("cy", d => yScale(d.v))
            .attr("r", 0) // Empiezan en cero para animación de entrada
            .merge(circles)
            .transition().duration(800) // TRANSICIÓN Y ANIMACIÓN
            .attr("cx", d => xScale(d.p) + (d.mes === 'Enero' ? -30 : 30))
            .attr("cy", d => yScale(d.v))
            .attr("r", d => rScale(d.precio))
            .attr("fill", d => COLORS[d.mes])
            .attr("stroke", "#fff");

        // EVENTOS
        svg.selectAll(".bubble")
            .on("mouseover", function(event, d) {
                const ingresos = (d.v * d.precio).toLocaleString('es-MX', {style:'currency', currency:'MXN'});
                d3.select(this).transition().duration(200).attr("r", rScale(d.precio) + 5);
                
                d3.select("body").append("div").attr("class", "tooltip")
                    .html(`<strong>${d.p} (${d.mes})</strong><br>
                           Ventas: ${d.v} unidades<br>
                           Precio: $${d.precio.toFixed(2)}<br>
                           <span style="color:#0f0">Ingresos: ${ingresos}</span>`)
                    .style("left", (event.pageX + 15) + "px")
                    .style("top", (event.pageY - 20) + "px");
            })
            .on("mouseout", function(event, d) {
                d3.select(this).transition().duration(200).attr("r", rScale(d.precio));
                d3.selectAll(".tooltip").remove();
            })
            .on("click", function(event, d) {
                // EVENTO CLICK: Efecto de pulso y alerta informativa
                d3.select(this).transition().duration(100).attr("r", rScale(d.precio) + 15)
                  .transition().duration(100).attr("r", rScale(d.precio));
                alert(`Análisis Detallado:\nEl ${d.p} en ${d.mes} generó un rendimiento de ${(d.v / 2).toFixed(1)}% sobre el objetivo.`);
            });
    }
</script>

</body>
</html>
